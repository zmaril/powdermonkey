name: CI

# Lint, format, typecheck, tests, and the compiled builds. These are required status
# checks on `main` (see the branch ruleset), so a red run blocks the merge button.
#
# Each heavy job runs only when files that could affect it changed, gated off the
# `changes` filter below. This is deliberately a job-level `if:` and NOT a workflow-level
# `paths:` filter: a job skipped by `if:` reports a "skipped" conclusion, which a required
# status check treats as success — so a docs-only PR still satisfies every required check.
# A `paths:` filter would instead leave the check *pending forever* and wedge the merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a fresh push doesn't queue behind a stale one.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      code: ${{ steps.filter.outputs.code }}
      tauri: ${{ steps.filter.outputs.tauri }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'bin/**'
              - 'scripts/**'
              - 'drizzle/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig*.json'
              - 'biome.json'
              - '.github/workflows/ci.yml'
            tauri:
              - 'src-tauri/**'
              - '.github/workflows/ci.yml'

  check:
    name: Lint & format (biome)
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # @disponent/node is a file: dep on a sibling checkout (../disponent) —
      # the engine that provisions exe.dev workers. Clone it at the pin and
      # build the napi addon so bun install can vendor it. Bump DISPONENT_REF
      # deliberately when adopting a new engine.
      # Pinned to disponent main (runtime string enums, post-#44): the node binding
      # emits the snake_case enums as named members (SessionState.Running, …). Bump this SHA to adopt a newer engine.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ../disponent
      - name: "Build @disponent/node (sibling file: dep)"
        env:
          DISPONENT_REF: cbdcd67ec1a50f03b898b945ad752221475b54a5
        run: |
          git init -q ../disponent
          git -C ../disponent fetch -q --depth 1 https://github.com/zmaril/disponent "$DISPONENT_REF"
          git -C ../disponent checkout -q FETCH_HEAD
          cd ../disponent/crates/disponent-node
          bun install
          bun run build
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run typecheck

  test:
    name: Tests (bun test)
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # @disponent/node is a file: dep on a sibling checkout (../disponent) —
      # the engine that provisions exe.dev workers. Clone it at the pin and
      # build the napi addon so bun install can vendor it. Bump DISPONENT_REF
      # deliberately when adopting a new engine.
      # Pinned to disponent main (runtime string enums, post-#44): the node binding
      # emits the snake_case enums as named members (SessionState.Running, …). Bump this SHA to adopt a newer engine.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ../disponent
      - name: "Build @disponent/node (sibling file: dep)"
        env:
          DISPONENT_REF: cbdcd67ec1a50f03b898b945ad752221475b54a5
        run: |
          git init -q ../disponent
          git -C ../disponent fetch -q --depth 1 https://github.com/zmaril/disponent "$DISPONENT_REF"
          git -C ../disponent checkout -q FETCH_HEAD
          cd ../disponent/crates/disponent-node
          bun install
          bun run build
      - run: bun install --frozen-lockfile
      # The worktree/teleport/reconcile suites shell out to git and tmux.
      # git and tmux ship on ubuntu-latest; the suites isolate their own
      # tmux socket and temp repos, but git needs a committer identity.
      - name: Configure git identity
        run: |
          git config --global user.name "PowderMonkey CI"
          git config --global user.email "ci@powdermonkey.local"
      - run: bun run test

  build:
    name: Build (web + compiled binary)
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # @disponent/node is a file: dep on a sibling checkout (../disponent) —
      # the engine that provisions exe.dev workers. Clone it at the pin and
      # build the napi addon so bun install can vendor it. Bump DISPONENT_REF
      # deliberately when adopting a new engine.
      # Pinned to disponent main (runtime string enums, post-#44): the node binding
      # emits the snake_case enums as named members (SessionState.Running, …). Bump this SHA to adopt a newer engine.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ../disponent
      - name: "Build @disponent/node (sibling file: dep)"
        env:
          DISPONENT_REF: cbdcd67ec1a50f03b898b945ad752221475b54a5
        run: |
          git init -q ../disponent
          git -C ../disponent fetch -q --depth 1 https://github.com/zmaril/disponent "$DISPONENT_REF"
          git -C ../disponent checkout -q FETCH_HEAD
          cd ../disponent/crates/disponent-node
          bun install
          bun run build
      - run: bun install --frozen-lockfile
      # build:compile runs build:web first, so both bundles are exercised.
      - run: bun run build:compile

  desktop-check:
    name: Desktop compile check (cargo check on src-tauri)
    needs: changes
    if: ${{ needs.changes.outputs.tauri == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo check --manifest-path src-tauri/Cargo.toml
