name: nightly

# Heavy targets build on a schedule: a full tauri desktop build is too slow
# for every PR (the per-PR floor is the desktop-check compile job in ci.yml),
# but it must run somewhere or it breaks silently.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  desktop:
    name: Full desktop build (tauri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # @disponent/node is a file: dep on a sibling checkout (../disponent) —
      # clone + build it at the pin so bun install can vendor it (same step as
      # ci.yml; keep the DISPONENT_REF values in lockstep).
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ../disponent
      - name: "Build @disponent/node (sibling file: dep)"
        env:
          DISPONENT_REF: ede045f9796f5512af0789855ee2a1528e1e1d15
        run: |
          git init -q ../disponent
          git -C ../disponent fetch -q --depth 1 https://github.com/zmaril/disponent "$DISPONENT_REF"
          git -C ../disponent checkout -q FETCH_HEAD
          cd ../disponent/crates/disponent-node
          bun install
          bun run build
      - run: bun install --frozen-lockfile
      - run: bun run tauri build
