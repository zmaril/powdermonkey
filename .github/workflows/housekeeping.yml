name: housekeeping
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:  # weekly drift check: dead links, stale PRs, settings flips

jobs:
  housekeeping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: zmaril/housekeeping@v0.9.0   # pin the full version, not the moving @v1
