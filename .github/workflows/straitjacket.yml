name: straitjacket

# Scan the repo for the weird code and text LLMs tend to generate.
# https://straitjacket.dev
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: straitjacket
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # v0.2.0 uploads findings to code scanning (SARIF) by default; that needs
    # security-events: write. Without it the scan still runs, just no annotations.
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      # Gating now — the adoption is done and the count is 0 (the one coincidental
      # FilterBar duplication carries a file-scoped allow marker). straitjacket fails the
      # job on any finding, so new slop can't land. SARIF still uploads to code scanning
      # by default. Needs >=v0.2.2 (allow-file suppresses duplication; 0.2.3 in Markdown too).
      - uses: zmaril/straitjacket@v0.2.3
        with:
          version: v0.2.3   # pin the scanner too; unset defaults to latest (floats)
