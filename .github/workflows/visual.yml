name: Visual (Lost Pixel)

# Storybook visual regression. Every story is screenshotted and compared against a
# committed baseline PNG under .lostpixel/baseline; a pixel change fails the job and
# uploads a diff image, so the change shows up in the PR.
#
# Rendering must be deterministic or fonts/antialiasing produce false diffs, so both
# the baselines and the comparison are produced by the SAME pinned Lost Pixel Docker
# image (matched to the lost-pixel version in package.json). That's why this runs the
# image directly rather than lost-pixel from node_modules.
#
# Advisory, off the PR gate: this runs on pushes to main (post-merge) and on a weekly
# schedule, not on pull_request — so a flaky pixel diff can't block a merge. It catches
# visual drift after it lands (and on the weekly sweep); the diff image is uploaded so
# the regression is visible on the run.
#
# Baselines are seeded once, by hand: run this workflow via "Run workflow"
# (workflow_dispatch) on the branch. That renders the current stories in the pinned
# image and commits them as the baseline. Until then the compare run is a no-op (it
# just tells you to seed). To accept an intended visual change, re-run the dispatch to
# refresh the baselines and commit.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1" # weekly visual-drift sweep
  workflow_dispatch:

concurrency:
  group: visual-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LP_IMAGE: lostpixel/lost-pixel:v3.22.0
  LOST_PIXEL_DISABLE_TELEMETRY: "1"

jobs:
  lost-pixel:
    name: Storybook visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # only used by the manual seed step to commit baselines
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      # @disponent/node is a file: dep on a sibling checkout (../disponent) —
      # clone + build it at the pin so bun install can vendor it (same step as
      # ci.yml; keep the DISPONENT_REF values in lockstep).
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ../disponent
      - name: "Build @disponent/node (sibling file: dep)"
        env:
          DISPONENT_REF: 7bdcce78ebbf27fbe1f71fc96153014aa1c08f76
        run: |
          git init -q ../disponent
          git -C ../disponent fetch -q --depth 1 https://github.com/zmaril/disponent "$DISPONENT_REF"
          git -C ../disponent checkout -q FETCH_HEAD
          cd ../disponent/crates/disponent-node
          bun install
          bun run build
      - run: bun install --frozen-lockfile

      - name: Build Storybook
        run: bun run build:storybook

      # Manual run: (re)generate the baselines in the pinned image and commit them.
      - name: Seed baselines
        if: github.event_name == 'workflow_dispatch'
        run: |
          docker run --rm \
            -e LOST_PIXEL_MODE=update \
            -e LOST_PIXEL_DISABLE_TELEMETRY=1 \
            -v "${{ github.workspace }}:/workdir" -w /workdir \
            "$LP_IMAGE"
          git config --global --add safe.directory "${{ github.workspace }}"
          git config user.name "PowderMonkey CI"
          git config user.email "ci@powdermonkey.local"
          if git status --porcelain .lostpixel/baseline | grep -q .; then
            git add .lostpixel/baseline
            git commit -m "chore(visual): update Lost Pixel baselines [skip ci]"
            git push
          else
            echo "Baselines already up to date."
          fi

      # Post-merge / scheduled run: compare against the committed baselines (once they exist).
      - name: Compare against baselines
        if: github.event_name != 'workflow_dispatch'
        run: |
          if [ -z "$(ls -A .lostpixel/baseline 2>/dev/null)" ]; then
            echo "::notice title=Lost Pixel::No baselines yet. Run this workflow via 'Run workflow' (workflow_dispatch) on this branch to seed them."
            exit 0
          fi
          docker run --rm \
            -e LOST_PIXEL_DISABLE_TELEMETRY=1 \
            -v "${{ github.workspace }}:/workdir" -w /workdir \
            "$LP_IMAGE"

      - name: Upload diff images
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lost-pixel-diff
          path: .lostpixel/difference/
          if-no-files-found: ignore
