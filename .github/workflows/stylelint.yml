name: stylelint
on:
  push:
    branches: [main]
  pull_request:

jobs:
  stylelint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npx --yes stylelint "**/*.{css,scss,sass,less}"
